name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
          
    - name: Download dependencies
      run: go mod download
      
    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      
    - name: Generate coverage report
      run: go tool cover -html=coverage.out -o coverage.html
      
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: |
          coverage.out
          coverage.html
        retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
          
    - name: Get version info
      id: version
      run: |
        echo "VERSION=dev-$(git describe --always --dirty)" >> $GITHUB_OUTPUT
        echo "BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
        echo "GIT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        
    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        BINARY_NAME=go-cert-provider
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME="${BINARY_NAME}.exe"
        fi
        
        go build \
          -ldflags="-s -w -X 'github.com/dh-kam/go-cert-provider/config.Version=${{ steps.version.outputs.VERSION }}' -X 'github.com/dh-kam/go-cert-provider/config.BuildTime=${{ steps.version.outputs.BUILD_TIME }}' -X 'github.com/dh-kam/go-cert-provider/config.GitCommit=${{ steps.version.outputs.GIT_COMMIT }}'" \
          -o "${BINARY_NAME}" \
          .
          
    - name: Test binary
      if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
      run: |
        ./go-cert-provider version
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v6
      with:
        name: go-cert-provider-${{ matrix.goos }}-${{ matrix.goarch }}
        path: go-cert-provider*
        retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        
    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

    - name: Run golangci-lint
      run: |
        "$(go env GOPATH)/bin/golangci-lint" run --timeout=5m
